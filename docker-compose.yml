version: "3.8"

# ── Named volume ───────────────────────────────────────────────────────────────
# DB and model weights survive container restarts and image rebuilds.
volumes:
  codelens_data:

# ── Base configuration (CPU — works on Linux, macOS, Windows) ─────────────────
# To enable GPU acceleration, layer one of the override files on top:
#
#   NVIDIA:  docker compose -f docker-compose.yml -f docker-compose.nvidia.yml up --build
#   AMD:     docker compose -f docker-compose.yml -f docker-compose.amd.yml    up --build
#   Intel:   docker compose -f docker-compose.yml -f docker-compose.intel.yml  up --build
#
# Apple Silicon: MPS is not available inside Docker containers.
#   Run natively for GPU acceleration:  python streamlit_app.py
#
services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile_fastapi
      args:
        GPU_BACKEND: cpu
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/codelens.db
      - MODEL_WEIGHTS_DIR=/app/data/model_weights
    volumes:
      - codelens_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile_streamlit
      args:
        GPU_BACKEND: cpu
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/codelens.db
      - MODEL_WEIGHTS_DIR=/app/data/model_weights
    volumes:
      - codelens_data:/app/data
    restart: unless-stopped
    depends_on:
      fastapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      start_period: 25s
      retries: 3

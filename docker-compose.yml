version: "3.8"

# Named volume — DB and model weights survive container restarts and rebuilds
volumes:
  codelens_data:

services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile_fastapi
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/codelens.db
      - MODEL_WEIGHTS_DIR=/app/data/model_weights
    volumes:
      - codelens_data:/app/data
    restart: unless-stopped
    # NVIDIA GPU reservation (requires nvidia-container-toolkit on the host)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile_streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/codelens.db
      - MODEL_WEIGHTS_DIR=/app/data/model_weights
    volumes:
      - codelens_data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      fastapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      start_period: 25s
      retries: 3
